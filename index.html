<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D426 Hard Practice Quiz</title>
<style>
  body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:20px; color:#222; }
  .container { max-width: 950px; margin: auto; background:#fff; padding:24px; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.12); }
  h1 { margin-top:0; }
  .meta { background:#eef4ff; padding:12px 14px; border-left:4px solid #497bd6; margin-bottom:18px; }
  .question { border:1px solid #ddd; border-radius:10px; padding:16px; margin:16px 0; background:#fbfbfb; }
  .question h3 { margin:0 0 12px; }
  label { display:block; padding:9px; margin:7px 0; background:white; border:1px solid #ddd; border-radius:8px; cursor:pointer; }
  label:hover { background:#f0f6ff; }
  button { background:#2563eb; color:white; border:none; border-radius:8px; padding:10px 14px; cursor:pointer; margin-top:10px; font-weight:bold; }
  button:hover { background:#1d4ed8; }
  .secondary { background:#444; }
  .secondary:hover { background:#222; }
  .feedback { margin-top:12px; padding:12px; border-radius:8px; display:none; }
  .correct { background:#d9fbe1; border:1px solid #47a65a; }
  .wrong { background:#ffe0e0; border:1px solid #c84b4b; }
  .scorebox { position: sticky; top: 0; z-index: 3; background:#111827; color:#fff; padding:14px; border-radius:10px; margin-bottom:15px; }
  .scorebox button { background:#22c55e; color:#111; }
  .scorebox button:hover { background:#16a34a; }
  .small { font-size:.92em; color:#555; }
  .result { font-size:1.2em; font-weight:bold; margin-top:10px; }
</style>
</head>
<body>
<div class="container">
  <h1>D426 Hard Practice Quiz</h1>
  <div class="meta">
    <strong>Harder version:</strong> 85 questions. Many questions have two close answers and two easier-to-eliminate answers. Use <strong>Submit This Question</strong> for instant feedback, then <strong>Submit Whole Quiz</strong> for your final score.
  </div>
  <div class="scorebox">
    <button onclick="gradeAll()">Submit Whole Quiz</button>
    <button class="secondary" onclick="resetQuiz()">Reset Quiz</button>
    <div id="finalScore" class="result"></div>
  </div>
  <form id="quizForm"></form>
</div>
<script>
const questions = [{"q": "A company wants to improve query speed by changing how rows are stored on disk, without changing what SELECT returns. Which concept is being relied on?", "choices": ["Data independence", "Functional dependence", "Authorization", "Referential integrity"], "a": 0, "exp": "Physical design can change storage/indexes for performance without changing query results; that is data independence."}, {"q": "Which pair best matches database design phases to their outputs?", "choices": ["Analysis → indexes/table partitions; logical design → file-system commands", "Physical design → business rules; analysis → SQL DDL statements", "Logical design → storage media; physical design → ER diagrams", "Analysis → entities/relationships/attributes; logical design → tables/keys/columns"], "a": 3, "exp": "Analysis captures requirements as entities, relationships, and attributes. Logical design converts them into tables, keys, and columns."}, {"q": "A user submits SQL. Which component is most directly responsible for interpreting the query and choosing an efficient plan?", "choices": ["Storage manager", "Database administrator", "Query processor", "Transaction manager"], "a": 2, "exp": "The query processor interprets queries, creates plans, and performs query optimization."}, {"q": "A database crashes halfway through a transaction. Which component is responsible for restoring consistency?", "choices": ["Storage manager", "API", "Transaction manager", "Query processor"], "a": 2, "exp": "The transaction manager ensures transactions execute correctly and restores the database after transaction or system failure."}, {"q": "Which example best describes a business rule rather than just a data type rule?", "choices": ["LastName must be VARCHAR(40)", "StudentID must be stored as an INT", "Salary must be stored as DECIMAL", "A course in a registration record must exist in the course catalog"], "a": 3, "exp": "Business rules come from organization policy, like requiring registered courses to exist in a catalog."}, {"q": "Which statement is DDL rather than DML or DQL?", "choices": ["SELECT Name FROM Student;", "CREATE TABLE Student (...);", "UPDATE Student SET Name='Ana';", "DELETE FROM Student WHERE ID=5;"], "a": 1, "exp": "DDL defines database structures. CREATE TABLE is DDL."}, {"q": "Which SQL sublanguage controls database user access?", "choices": ["DML", "DCL", "DTL", "DQL"], "a": 1, "exp": "DCL stands for Data Control Language and controls access."}, {"q": "A table has columns but no rows. What is it called?", "choices": ["Null table", "Heap table", "Sparse table", "Empty table"], "a": 3, "exp": "A table without rows is called an empty table."}, {"q": "Which statement about rows in a relational table is correct?", "choices": ["Rows are ordered tuples, so the table itself has row order", "Rows are always physically sorted by the primary key", "Rows have no inherent order because a table is a set of rows", "Rows must be stored in insertion order"], "a": 2, "exp": "A row is an ordered tuple of values, but a table is a set of rows, so rows have no inherent order."}, {"q": "Which synonym set is correct?", "choices": ["Column/File/Relation", "Table/Record/Tuple", "Row/Record/Tuple", "Field/Row/Attribute"], "a": 2, "exp": "Row, record, and tuple are synonyms."}, {"q": "In SQL syntax, SELECT, FROM, and WHERE are examples of what?", "choices": ["Comments", "Identifiers", "Keywords", "Literals"], "a": 2, "exp": "Keywords are words with special meaning in SQL."}, {"q": "City, Name, and Population used as table or column names are examples of what?", "choices": ["Operators", "Comments", "Identifiers", "Binary literals"], "a": 2, "exp": "Identifiers refer to database objects like tables and columns."}, {"q": "Which value is a string literal in SQL?", "choices": ["'Phoenix'", "-- Phoenix", "SELECT", "City"], "a": 0, "exp": "String literals are explicit text values enclosed in quotes."}, {"q": "Which statement best describes ALTER TABLE?", "choices": ["It adds, deletes, or modifies columns/constraints on an existing table", "It changes rows in a table using SET", "It retrieves rows from one or more tables", "It removes a table and all rows from the database"], "a": 0, "exp": "ALTER TABLE modifies the structure of an existing table."}, {"q": "Which statement deletes a table and all its rows?", "choices": ["REMOVE TABLE", "DROP TABLE", "DELETE TABLE", "TRUNCATE TABLE"], "a": 1, "exp": "DROP TABLE deletes the table itself along with its rows."}, {"q": "A column needs to store values from 0 to 255 using as little storage as possible. Which integer type fits best?", "choices": ["INT signed", "TINYINT unsigned", "SMALLINT signed", "BIGINT unsigned"], "a": 1, "exp": "Unsigned TINYINT stores 0 to 255 using 1 byte."}, {"q": "Which integer type uses 4 bytes in MySQL?", "choices": ["SMALLINT", "INT", "BIGINT", "MEDIUMINT"], "a": 1, "exp": "INT/INTEGER commonly uses 4 bytes."}, {"q": "The expression 5 % 2 returns what?", "choices": ["10", "1", "2.5", "0"], "a": 1, "exp": "Modulo returns the integer remainder. 5 divided by 2 leaves remainder 1."}, {"q": "What is the main danger of running UPDATE without a WHERE clause?", "choices": ["The SQL becomes DDL", "Only the primary key changes", "Every row may be updated", "The table is deleted"], "a": 2, "exp": "Without WHERE, UPDATE applies to all rows."}, {"q": "What is TRUNCATE most similar to?", "choices": ["MERGE with no source table", "UPDATE with no SET clause", "DELETE with no WHERE clause", "DROP TABLE with a WHERE clause"], "a": 2, "exp": "TRUNCATE deletes all rows and is nearly identical to DELETE without WHERE, depending on the DBMS."}, {"q": "MERGE is best described as a statement that:", "choices": ["Selects data from a source table and inserts it into a target table", "Combines two SELECT result sets into one result table", "Deletes all rows but keeps the table structure", "Creates a new index on two tables"], "a": 0, "exp": "The guide describes MERGE as selecting data from a source and inserting it into a target."}, {"q": "Which is the best definition of a primary key?", "choices": ["A column that must contain descriptive business information", "A column that always references another table", "A column or group of columns used to identify a row", "A column that physically sorts the table"], "a": 2, "exp": "A primary key identifies rows. It may be one column or multiple columns."}, {"q": "A primary key made from StudentID and CourseID together is called:", "choices": ["Artificial key", "Materialized key", "Foreign key", "Composite primary key"], "a": 3, "exp": "A composite primary key consists of multiple columns."}, {"q": "Which is usually a mistake when using an auto-increment primary key?", "choices": ["Making it numeric", "Using it as a simple primary key", "Letting the database generate the value", "Overriding it by inserting a specific value"], "a": 3, "exp": "MySQL may allow this, but overriding auto-increment primary keys is usually a mistake."}, {"q": "A foreign key must have the same ____ as the primary key it references, but it may have a different ____.", "choices": ["index; constraint", "constraint; table", "name; data type", "data type; name"], "a": 3, "exp": "Foreign and primary keys must have the same data type, but names can differ."}, {"q": "What happens when a foreign key constraint is violated?", "choices": ["The query processor converts the key to NULL automatically every time", "The primary key is dropped", "The database rejects insert, update, or delete statements that violate referential integrity", "The database accepts the row but marks it invalid"], "a": 2, "exp": "Foreign key constraints enforce referential integrity by rejecting invalid operations unless an action is specified."}, {"q": "Which referential integrity action sets invalid foreign keys to the foreign key default value?", "choices": ["SET NULL", "SET DEFAULT", "CASCADE", "RESTRICT"], "a": 1, "exp": "SET DEFAULT changes invalid foreign keys to the foreign key's default value."}, {"q": "Which referential integrity action propagates primary key changes to foreign keys?", "choices": ["RESTRICT", "SET NULL", "SET DEFAULT", "CASCADE"], "a": 3, "exp": "CASCADE propagates primary key changes to matching foreign keys."}, {"q": "A rule limiting allowable values in a database is a:", "choices": ["View", "Constraint", "Tuple", "Tablespace"], "a": 1, "exp": "Constraints govern allowable values and are enforced by the database."}, {"q": "Which expression is equivalent to Age BETWEEN 18 AND 65?", "choices": ["Age <= 18 AND Age >= 65", "Age = 18 OR Age = 65", "Age > 18 AND Age < 65", "Age >= 18 AND Age <= 65"], "a": 3, "exp": "BETWEEN includes the minimum and maximum values."}, {"q": "Which pattern matches 'Lt', 'Lot', and 'Lift'?", "choices": ["LIKE 'L%t'", "LIKE 'L*t'", "LIKE 'L_t'", "LIKE 'L__t'"], "a": 0, "exp": "% matches any number of characters, including zero characters."}, {"q": "Which pattern matches 'Lot' and 'Lit' but not 'Lt' or 'Loot'?", "choices": ["LIKE 'L_t'", "LIKE 'L%t'", "LIKE '%Lt'", "LIKE 'L__t'"], "a": 0, "exp": "_ matches exactly one character."}, {"q": "Where does DESC belong when sorting rows from highest to lowest?", "choices": ["Before SELECT", "Inside WHERE", "After HAVING only", "After ORDER BY column name"], "a": 3, "exp": "DESC is used with ORDER BY to sort in descending order."}, {"q": "Which function removes leading and trailing spaces from a string?", "choices": ["SECOND()", "LOWER()", "TRIM()", "ABS()"], "a": 2, "exp": "TRIM() returns the string without leading/trailing spaces."}, {"q": "Which statement about aggregate functions is correct?", "choices": ["They process sets of rows and return summary values", "They can only appear in WHERE clauses", "They modify rows permanently", "They create physical indexes"], "a": 0, "exp": "COUNT, MIN, MAX, SUM, and AVG process rows and return summaries."}, {"q": "Which clause is used with GROUP BY to filter group results?", "choices": ["WHERE", "FROM", "ORDER BY", "HAVING"], "a": 3, "exp": "HAVING filters grouped results and follows GROUP BY."}, {"q": "A SELECT combines data from two tables by comparing comparable columns. This is a:", "choices": ["Tablespace", "Comment", "Join", "Constraint"], "a": 2, "exp": "A join combines data from a left and right table, usually by comparing columns."}, {"q": "Which join returns only rows that match in both left and right tables?", "choices": ["LEFT JOIN", "FULL JOIN", "INNER JOIN", "RIGHT JOIN"], "a": 2, "exp": "INNER JOIN selects only matching rows from both tables."}, {"q": "Which join returns all left table rows and only matching right table rows?", "choices": ["FULL JOIN", "INNER JOIN", "LEFT JOIN", "RIGHT JOIN"], "a": 2, "exp": "LEFT JOIN keeps all left rows and matching right rows."}, {"q": "Which joins are considered outer joins?", "choices": ["LEFT, RIGHT, and FULL JOIN", "Only CROSS JOIN", "SELF JOIN and INNER JOIN", "Only INNER JOIN"], "a": 0, "exp": "An outer join selects unmatched rows; left, right, and full joins do that."}, {"q": "What does UNION do?", "choices": ["Combines all possible row pairs from two tables", "Filters groups after GROUP BY", "Creates an alias for a table", "Combines two query results into one table"], "a": 3, "exp": "UNION combines two result sets into one table."}, {"q": "Most joins are equijoins because they compare columns using:", "choices": ["<", ">", "LIKE", "="], "a": 3, "exp": "An equijoin compares columns using the equality operator."}, {"q": "A non-equijoin compares columns using:", "choices": ["Only BETWEEN", "An operator other than =, such as < or >", "Only =", "No operator at all"], "a": 1, "exp": "Non-equijoins use comparison operators other than equals."}, {"q": "A cross join differs from most joins because it:", "choices": ["Requires a foreign key constraint", "Always removes duplicates", "Uses no ON clause and returns all possible combinations", "Only returns unmatched rows"], "a": 2, "exp": "CROSS JOIN has no ON clause and produces all row combinations."}, {"q": "A query inside another SQL query is a:", "choices": ["Index scan", "Subquery", "Tablespace", "View"], "a": 1, "exp": "A subquery is also called a nested query or inner query."}, {"q": "What does AS usually create in SQL?", "choices": ["A foreign key", "A materialized table", "An alias", "A constraint"], "a": 2, "exp": "AS creates a temporary name for a column or table."}, {"q": "What is special about a materialized view?", "choices": ["It has no relationship to base tables", "It is always a temporary alias", "It cannot be refreshed", "It stores view data at all times"], "a": 3, "exp": "A materialized view stores data and may need refreshes when base tables change."}, {"q": "WITH CHECK OPTION prevents which action?", "choices": ["Inserts or updates that do not satisfy the view query WHERE clause", "Queries that use aliases", "Joins that compare columns with =", "Indexes from being created"], "a": 0, "exp": "WITH CHECK OPTION rejects inserts/updates that would not satisfy the view's WHERE condition."}, {"q": "In an ER model, a person, place, product, concept, or activity is a(n):", "choices": ["Relationship", "Entity", "Attribute", "Tablespace"], "a": 1, "exp": "Entities are the main things being modeled."}, {"q": "In an ER model, a statement about two entities is a(n):", "choices": ["Instance", "Attribute", "Index", "Relationship"], "a": 3, "exp": "A relationship is a statement about entities."}, {"q": "In ER modeling, a relationship where an entity relates to itself is called:", "choices": ["Reflexive", "Sparse", "Trivial", "Artificial"], "a": 0, "exp": "A reflexive relationship relates an entity to itself."}, {"q": "In an ER diagram, entities are commonly drawn as:", "choices": ["Dotted lines only", "Rectangles", "Circles only", "Diamonds only"], "a": 1, "exp": "The study guide states entities are drawn as rectangles."}, {"q": "Which example is an entity instance, not an entity type?", "choices": ["Employee-Manages-Department pairs", "All employees in a company", "The employee Sam Snead", "All employee salaries"], "a": 2, "exp": "An entity instance is one individual thing, like a specific employee."}, {"q": "Which example is an attribute type?", "choices": ["Maria Rodriguez manages Sales", "Employee table row 12", "All employee salaries", "The employee Sam Snead"], "a": 2, "exp": "An attribute type is a set of values, such as all employee salaries."}, {"q": "Which order correctly places analysis steps before logical design steps?", "choices": ["Discover entities/relationships/attributes → determine cardinality → distinguish strong/weak entities → create supertypes/subtypes", "Implement relationships → apply normal form → determine cardinality → create subtypes", "Apply normal form → discover entities → implement attributes → determine cardinality", "Physical partitions → table clusters → indexes → cardinality"], "a": 0, "exp": "Those are the four analysis steps in order."}, {"q": "Which logical design step happens last in the guide's list?", "choices": ["Implement relationships", "Implement attributes", "Implement entities", "Apply normal form"], "a": 3, "exp": "Logical design steps end with applying normal form."}, {"q": "Relationship maximum means:", "choices": ["The maximum number of rows returned by a query", "The least number of columns allowed in a table", "The maximum number of bytes in a primary key", "The greatest number of instances of one entity that can relate to one instance of another"], "a": 3, "exp": "Cardinality includes relationship maximums and minimums."}, {"q": "Crow's foot notation uses which symbols for cardinality?", "choices": ["Square, star, and triangle", "Primary key, foreign key, and index", "Circle, short line, and three short lines", "Dense, sparse, and bitmap"], "a": 2, "exp": "Crow's foot notation uses circle for zero, short line for one, and three short lines for many."}, {"q": "A subtype entity is best described as:", "choices": ["A subset of a supertype entity", "A primary key created by the database designer", "A table without rows", "An attribute with multiple values"], "a": 0, "exp": "A subtype is a subset of a supertype, like Car as a subtype of Vehicle."}, {"q": "The identifying relationship between subtype and supertype is called:", "choices": ["HasA", "PartOf", "Equals", "IsA"], "a": 3, "exp": "The guide calls the identifying relationship an IsA relationship."}, {"q": "A partition of a supertype entity is a group of subtype entities that are:", "choices": ["Always physical tablespaces", "Always weak", "Mutually exclusive", "Always nullable"], "a": 2, "exp": "A partition is a group of mutually exclusive subtype entities."}, {"q": "Which is NOT a preferred primary key quality?", "choices": ["Meaningless", "Stable", "Simple", "Descriptive"], "a": 3, "exp": "Primary keys should generally be stable, simple, and meaningless. Descriptive information can change."}, {"q": "Why are descriptive primary keys discouraged?", "choices": ["They always violate BCNF", "They cannot be indexed", "They cannot be used in WHERE clauses", "Descriptions may change, making the key unstable"], "a": 3, "exp": "Descriptive data can change, causing instability and cascading updates."}, {"q": "An artificial key is created when:", "choices": ["A foreign key points to two tables", "A table has no rows", "No suitable simple or composite primary key exists", "A query needs an alias"], "a": 2, "exp": "A database designer creates an artificial key when no good existing primary key is available."}, {"q": "Functional dependence means:", "choices": ["Two tables are joined by CROSS JOIN", "Rows are physically sorted", "Foreign keys are invalid", "One column depends on another"], "a": 3, "exp": "Dependence of one column on another is functional dependence."}, {"q": "Redundancy means:", "choices": ["The repetition of related values in a table", "A table with no rows", "A primary key with multiple columns", "A view that stores data"], "a": 0, "exp": "Redundancy is repeated related values."}, {"q": "A candidate key must be:", "choices": ["Unique and minimal", "Descriptive and long", "A foreign key", "Nullable and composite"], "a": 0, "exp": "A candidate key is a simple or composite column that is unique and minimal."}, {"q": "A non-key column is a column that:", "choices": ["Is not contained in a candidate key", "Is always a foreign key", "Cannot contain NULL", "Determines physical row order"], "a": 0, "exp": "Non-key columns are not part of candidate keys."}, {"q": "A table is in third normal form if whenever non-key column A depends on B, then B is:", "choices": ["Nullable", "Unique", "A foreign key only", "A text column"], "a": 1, "exp": "In 3NF, if a non-key column depends on B, then B must be unique."}, {"q": "BCNF differs from 3NF because BCNF removes which limitation from the definition?", "choices": ["The term non-key", "The term unique", "The term column", "The term table"], "a": 0, "exp": "BCNF uses the same idea as 3NF but removes the 'non-key' limitation."}, {"q": "Why is BCNF often described as the gold standard in the guide?", "choices": ["It removes the need for primary keys", "It intentionally introduces redundancy", "It is ideal for tables with frequent inserts, updates, and deletes", "It optimizes only bulk loads"], "a": 2, "exp": "The guide says BCNF is ideal for frequent inserts, updates, and deletes."}, {"q": "A dependency where A is a subset of B is called:", "choices": ["Artificial", "Trivial", "Sparse", "Reflexive"], "a": 1, "exp": "If columns of A are a subset of B, A depends on B; this is a trivial dependency."}, {"q": "Normalization eliminates redundancy by:", "choices": ["Merging tables intentionally", "Creating bitmap indexes", "Decomposing a table into two or more tables in higher normal form", "Using CROSS JOIN"], "a": 2, "exp": "Normalization decomposes tables to reduce redundancy."}, {"q": "Denormalization means:", "choices": ["Applying BCNF to every table", "Deleting duplicate rows only", "Removing every foreign key", "Intentionally introducing redundancy by merging tables"], "a": 3, "exp": "Denormalization intentionally adds redundancy, often by merging tables."}, {"q": "Which table structure imposes no order on rows and is fast for bulk inserts?", "choices": ["Table cluster", "Hash table", "Heap table", "Sorted table"], "a": 2, "exp": "Heap tables impose no row order and optimize inserts/bulk loads."}, {"q": "In a sorted table, physical row order is determined by:", "choices": ["The query processor only", "A bitmap grid", "A foreign key constraint", "A sort column"], "a": 3, "exp": "A sorted table uses a sort column for physical row order."}, {"q": "In a hash table, rows are assigned to:", "choices": ["Buckets", "Constraints", "Aliases", "Views"], "a": 0, "exp": "Hash tables assign rows to buckets."}, {"q": "A table cluster does what?", "choices": ["Stores only index entries", "Deletes all rows from two tables", "Forces every table into BCNF", "Interleaves rows of two or more tables in the same storage area"], "a": 3, "exp": "Table clusters, or multi-tables, interleave rows from multiple tables in one storage area."}, {"q": "Which operation reads table blocks directly without using an index?", "choices": ["Table scan", "Hash index", "Index scan", "Binary search"], "a": 0, "exp": "A table scan reads table blocks directly without accessing an index."}, {"q": "Which operation reads index blocks sequentially to locate needed table blocks?", "choices": ["TRUNCATE", "Table scan", "Cross join", "Index scan"], "a": 3, "exp": "An index scan reads index blocks in order to locate table blocks."}, {"q": "Hit ratio, filter factor, and selectivity all refer to:", "choices": ["The percentage of table rows selected by a query", "The number of bytes in INT", "The number of columns in a primary key", "The number of tables in a join"], "a": 0, "exp": "These terms all describe the percentage of rows selected by a query."}, {"q": "A dense index contains:", "choices": ["An entry for every table block", "Only primary keys with NULLs", "An entry for every table row", "Only bitmap values"], "a": 2, "exp": "Dense indexes have an entry for each row."}, {"q": "A sparse index contains:", "choices": ["An entry for every table block", "Every possible foreign key", "Only string literals", "An entry for every table row"], "a": 0, "exp": "Sparse indexes have an entry for each table block."}, {"q": "A bitmap index is best described as:", "choices": ["A view that stores data", "A table with no rows", "A row order based on a sort column", "A grid of bits containing ones and zeros"], "a": 3, "exp": "Bitmap indexes are grids of bits with ones and zeros."}, {"q": "A tablespace maps:", "choices": ["One alias to one column", "One or more tables to a single file", "One primary key to one foreign key", "One query to one transaction"], "a": 1, "exp": "The guide defines a tablespace as mapping one or more tables to a single file."}, {"q": "CREATE INDEX syntax generally includes:", "choices": ["INDEX CREATE ON ColumnName TABLE TableName;", "ALTER INDEX TableName ADD ColumnName;", "CREATE INDEX TableName FROM ColumnName;", "CREATE INDEX IndexName ON TableName (Column1, ...);"], "a": 3, "exp": "The guide shows CREATE INDEX IndexName ON TableName (Column1, Column2, ..., ColumnN)."}, {"q": "Which physical design objects are mentioned together in the guide?", "choices": ["Rows, records, and tuples", "Literals, keywords, and comments", "Entities, relationships, and attributes", "Indexes, table structures, and partitions"], "a": 3, "exp": "Physical design specifies indexes, table structures, and partitions."}];
const letters = ['A','B','C','D'];
const form = document.getElementById('quizForm');
questions.forEach((q, idx) => {
  const div = document.createElement('div');
  div.className = 'question';
  div.id = 'qbox' + idx;
  let inner = `<h3>${idx+1}. ${q.q}</h3>`;
  q.choices.forEach((choice, cidx) => {
    inner += `<label><input type="radio" name="q${idx}" value="${cidx}"> <strong>${letters[cidx]}.</strong> ${choice}</label>`;
  });
  inner += `<button type="button" onclick="gradeOne(${idx})">Submit This Question</button>`;
  inner += `<div class="feedback" id="fb${idx}"></div>`;
  div.innerHTML = inner;
  form.appendChild(div);
});
function gradeOne(i) {
  const selected = document.querySelector(`input[name="q${i}"]:checked`);
  const fb = document.getElementById('fb' + i);
  fb.style.display = 'block';
  if (!selected) {
    fb.className = 'feedback wrong';
    fb.innerHTML = 'Pick an answer first.';
    return false;
  }
  const ans = parseInt(selected.value);
  const correct = questions[i].a;
  if (ans === correct) {
    fb.className = 'feedback correct';
    fb.innerHTML = `<strong>Correct.</strong> ${questions[i].exp}`;
    return true;
  } else {
    fb.className = 'feedback wrong';
    fb.innerHTML = `<strong>Incorrect.</strong> Correct answer: <strong>${letters[correct]}. ${questions[i].choices[correct]}</strong><br>${questions[i].exp}`;
    return false;
  }
}
function gradeAll() {
  let score = 0;
  let unanswered = 0;
  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (!selected) unanswered++;
    if (gradeOne(i)) score++;
  });
  const percent = Math.round((score / questions.length) * 100);
  document.getElementById('finalScore').innerHTML = `Score: ${score} / ${questions.length} (${percent}%)` + (unanswered ? ` — Unanswered: ${unanswered}` : '');
  window.scrollTo({top:0, behavior:'smooth'});
}
function resetQuiz() {
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.querySelectorAll('.feedback').forEach(f => { f.style.display='none'; f.innerHTML=''; });
  document.getElementById('finalScore').innerHTML = '';
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
</html>
